<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>결혼합니다</title>
        
        <meta property="og:title" content="유동진 🩵 조혜인: 결혼합니다" />
        <meta property="og:description" content="저희의 소중한 시작을 담은 모바일 청첩장이 6월에 공개됩니다." />
        
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        
        <style>
            @font-face {
                font-family: 'SchoolSafetyFoundation';
                src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimBareonbatangR.woff2') format('woff2');
            }

            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #FDFDFD;
                font-family: 'SchoolSafetyFoundation', sans-serif;
                color: #333;
                text-align: center;
            }

            /* BGM 컨트롤 버튼 스타일 */
            #bgm-control-container {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 1000;
            }

            #bgm-toggle-btn {
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid #0067A3;
                color: #0067A3;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                transition: all 0.3s ease;
            }

            #bgm-toggle-btn.muted {
                color: #999;
                border-color: #999;
            }

            .notice-container {
                padding: 20px;
            }

            .flower-icon {
                width: 60px;
                margin-bottom: 25px;
            }

            .title {
                color: #0067A3; 
                font-family: 'Pinyon Script', cursive;
                font-size: 2.5em;
                margin-bottom: 10px;
            }

            .message {
                font-size: 1.1em;
                line-height: 1.8;
                color: #555;
            }

            .date-highlight {
                font-weight: bold;
                color: #0067A3;
            }

            .footer {
                margin-top: 30px;
                font-size: 0.9em;
                color: #999;
            }
        </style>
    </head>

    <body>
        <audio id="bgm" loop preload="auto">
            <source src="./bgm.mp3" type="audio/mp3">
        </audio>
        
        <div id="bgm-control-container">
            <button id="bgm-toggle-btn">
                <i class="fas fa-volume-up"></i>
            </button>
        </div>

        <!-- <div class = "container">
            <div class = "container initial-hidden">
                <audio id="bgm" loop preload="auto" muted>
                    <source src="./bgm.mp3" type="audio/mp3">
                </audio>
            </div>
            
            <div id="bgm-control-container">
                <button id="bgm-toggle-btn" class="bgm-playing">
                <i class="fas fa-volume-up"></i>
                </button>
         -->    </div>

        <div class="notice-container">
            <img src="./icon/flower.png" alt="꽃" class="flower-icon">
            <div class="title">Coming Soon</div>
            <p class="message">
                저희 두 사람의 소중한 시작을 담은<br>
                모바일 청첩장이 <span class="date-highlight">2026년 6월</span>에<br>
                정식 오픈될 예정입니다.
            </p>
            <p class="footer">조금만 기다려주세요. 감사합니다.</p>
        </div>

        <script>
            const bgm = document.getElementById('bgm');
            const bgmBtn = document.getElementById('bgm-toggle-btn');
            const bgmIcon = bgmBtn.querySelector('i');

            // BGM 재생/일시정지 토글 함수
            function toggleBgm() {
                if (bgm.paused) {
                    bgm.play();
                    bgmBtn.classList.remove('muted');
                    bgmIcon.className = 'fas fa-volume-up';
                } else {
                    bgm.pause();
                    bgmBtn.classList.add('muted');
                    bgmIcon.className = 'fas fa-volume-mute';
                }
            }

            bgmBtn.addEventListener('click', toggleBgm);

            // 브라우저 정책 대응: 첫 터치 시 재생 시도
            function startBgmOnInteraction() {
                bgm.play().then(() => {
                    // 재생 성공 시 이벤트 리스너 제거
                    document.removeEventListener('click', startBgmOnInteraction);
                    document.removeEventListener('touchstart', startBgmOnInteraction);
                }).catch(error => {
                    console.log("자동 재생 대기 중...");
                });
            }

            document.addEventListener('click', startBgmOnInteraction);
            document.addEventListener('touchstart', startBgmOnInteraction);

            // URL 파라미터에 playBgm=true가 있을 경우 자동 실행 (기존 로직 유지)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('playBgm') === 'true') {
                startBgmOnInteraction();
            }
        </script>
    </body>
</html>
